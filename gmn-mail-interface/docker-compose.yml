services:
  backend:
    build: ./backend
    env_file: .env
    volumes:
      - backend_data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/mail_interface.db
    restart: unless-stopped
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "8080:80"

volumes:
  backend_data:
